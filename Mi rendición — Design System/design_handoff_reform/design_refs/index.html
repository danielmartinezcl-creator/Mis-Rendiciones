<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mi rendición — Web App · UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
  html, body { margin: 0; height: 100%; background: var(--ink-100); }
  #root { height: 100%; }
  .app-frame { display: flex; height: 100vh; background: var(--bg-app); overflow: hidden; }
  .app-main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .app-scroll { flex: 1; overflow-y: auto; padding: 28px; }
  @keyframes ds-slidein { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  @keyframes ds-fade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes ds-pop { 0% { transform: scale(.85); } 60% { transform: scale(1.08); } 100% { transform: scale(1); } }
  @keyframes ds-scan { 0% { top: -40%; } 100% { top: 100%; } }
  @keyframes ds-spin { to { transform: rotate(360deg); } }
  @keyframes drawLine { to { stroke-dashoffset: 0; } }
  @keyframes ds-fade  { from { opacity: 0; } to { opacity: 1; } }
  @keyframes alertPulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:.5; transform:scale(1.5); } }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--ink-200); border-radius: 999px; border: 3px solid var(--bg-app); }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-300); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="foundation.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="screens-employee.jsx"></script>
<script type="text/babel" src="screens-admin.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const TITLES = {
  estado:       ['Estado', 'Tu resumen de rendiciones'],
  nueva:        ['Nueva rendición', 'Saca la foto y la IA completa el resto'],
  reembolsos:   ['Mis reembolsos', 'Estado de tus devoluciones'],
  admin:        ['Dashboard', 'Vista general de la organización'],
  rendiciones:  ['Rendiciones', 'Todas las rendiciones de la empresa'],
  aprobaciones: ['Aprobaciones', 'Revisa y aprueba ítem por ítem'],
  empleados:    ['Empleados', 'Personas y aprobadores'],
  config:       ['Configuración', 'Categorías y políticas de gasto'],
};

function Placeholder({ icon, title, note }) {
  return (
    <div style={{ maxWidth: 560, margin: '60px auto', textAlign: 'center', color: 'var(--fg-subtle)' }}>
      <div style={{ width: 64, height: 64, borderRadius: 'var(--r-lg)', background: 'var(--white)', boxShadow: 'var(--shadow-sm)', display: 'grid', placeItems: 'center', margin: '0 auto 16px' }}>
        <Icon name={icon} size={28} color="var(--brand)" />
      </div>
      <div style={{ fontFamily: 'var(--font-display)', fontWeight: 700, fontSize: 18, color: 'var(--fg-strong)' }}>{title}</div>
      <p style={{ fontSize: 13.5, marginTop: 6 }}>{note}</p>
    </div>
  );
}

function Empleados() {
  const rows = [
    { n: 'Camila Soto', e: 'camila@empresa.cl', d: 'Comercial', r: 'Empleada', a: false },
    { n: 'Diego Fuentes', e: 'diego@empresa.cl', d: 'Finanzas', r: 'Aprobador', a: true },
    { n: 'Josefa Lagos', e: 'josefa@empresa.cl', d: 'Marketing', r: 'Empleada', a: false },
    { n: 'Pedro Ramírez', e: 'pedro@empresa.cl', d: 'Operaciones', r: 'Empleado', a: false },
    { n: 'Valentina Ríos', e: 'valentina@empresa.cl', d: 'Finanzas', r: 'Admin', a: true },
  ];
  return (
    <div style={{ maxWidth: 'var(--content-max)', margin: '0 auto' }}>
      <div style={{ display: 'flex', justifyContent: 'flex-end', marginBottom: 14 }}><Btn variant="primary" icon="user-plus">Agregar empleado</Btn></div>
      <div style={{ background: 'var(--white)', borderRadius: 'var(--r-lg)', boxShadow: 'var(--shadow-sm)', overflow: 'hidden' }}>
        {rows.map((r, i) => (
          <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 14, padding: '14px 18px', borderTop: i ? '1px solid var(--divider)' : 'none' }}>
            <div style={{ width: 38, height: 38, borderRadius: '50%', background: 'var(--teal-50)', color: 'var(--brand-pressed)', display: 'grid', placeItems: 'center', fontWeight: 700, fontSize: 14 }}>{r.n[0]}</div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 14, fontWeight: 700, color: 'var(--fg-strong)' }}>{r.n}</div>
              <div style={{ fontSize: 12, color: 'var(--fg-subtle)' }}>{r.e} · {r.d}</div>
            </div>
            {r.a && <span style={{ fontSize: 11, fontWeight: 700, color: 'var(--l2-fg)', background: 'var(--l2-bg)', padding: '3px 10px', borderRadius: 'var(--r-full)' }}>Puede aprobar</span>}
            <span style={{ fontSize: 12.5, fontWeight: 600, color: 'var(--fg-muted)', width: 90, textAlign: 'right' }}>{r.r}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function ReembolsosScreen() {
  const list = REPORTS.filter(r => ['reimbursed', 'approved', 'partially_approved'].includes(r.status));
  return (
    <div style={{ maxWidth: 640, margin: '0 auto', display: 'flex', flexDirection: 'column', gap: 10 }}>
      {list.map((r, i) => <ReportRow key={r.id} r={r} i={i} />)}
    </div>
  );
}

function screenFor(id, go) {
  switch (id) {
    case 'estado':       return <EstadoScreen onNueva={() => go('nueva')} />;
    case 'nueva':        return <NuevaScreen />;
    case 'reembolsos':   return <ReembolsosScreen />;
    case 'admin':        return <AdminScreen />;
    case 'rendiciones':  return <RendicionesScreen />;
    case 'aprobaciones': return <AprobacionesScreen />;
    case 'empleados':    return <Empleados />;
    case 'config':       return <Placeholder icon="settings-2" title="Categorías y políticas" note="Define categorías de gasto, montos máximos por categoría y los niveles de aprobación (N1 / N2)." />;
    default:             return null;
  }
}

function App() {
  const [authed, setAuthed] = useState(false);
  const [role, setRole] = useState('employee');
  const [active, setActive] = useState('estado');

  function changeRole(r) {
    setRole(r);
    setActive(NAV[r][0].id);
  }

  if (!authed) return <Login onEnter={() => setAuthed(true)} />;

  const [title, subtitle] = TITLES[active] || ['', ''];
  return (
    <div className="app-frame">
      <Sidebar role={role} active={active} onNav={setActive} />
      <div className="app-main">
        <TopBar role={role} onRole={changeRole} title={title} subtitle={subtitle} />
        <div className="app-scroll">
          <div key={role + active} style={{ animation: 'ds-fade var(--dur) ease' }}>
            {screenFor(active, setActive)}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
